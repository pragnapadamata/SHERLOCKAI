version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sherlock-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override ALLOWED_ORIGINS to allow access from local docker frontend
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:3001","https://tata-steel-sherlock.vercel.app"]
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: sherlock-frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    environment:
      - PORT=3000
    restart: always
